<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes in1   { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
      @keyframes in2   { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
      @keyframes in3   { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
      @keyframes in4   { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
      .mono { font-family:'Courier New',monospace; }
      .sans { font-family:'Segoe UI',Arial,sans-serif; }
      .r1 { opacity:0; animation:in1 0.4s 0.3s ease forwards; }
      .r2 { opacity:0; animation:in2 0.4s 0.7s ease forwards; }
      .r3 { opacity:0; animation:in3 0.4s 1.1s ease forwards; }
      .r4 { opacity:0; animation:in4 0.4s 1.5s ease forwards; }
      .cur{ animation:blink 1s 1.5s infinite; }
    </style>
  </defs>

  <!-- Window bg -->
  <rect width="900" height="200" rx="10" fill="url(#grad)"/>

  <!-- Title bar -->
  <rect width="900" height="36" rx="10" fill="#1e1b36"/>
  <rect y="26" width="900" height="10" fill="#1e1b36"/>
  <rect y="36" width="900" height="1" fill="#2d2a50"/>

  <!-- Traffic lights -->
  <circle cx="26" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>

  <!-- Tab title -->
  <text x="450" y="22" text-anchor="middle" class="mono" fill="#8b89a8" font-size="12">~/your-name — main ✦</text>

  <!-- Prompt line 1 -->
  <g class="r1">
    <text x="32" y="68" class="mono" fill="#6b7280" font-size="13">Last login: Mon Oct 14 22:31:04</text>
  </g>

  <!-- Prompt line 2 -->
  <g class="r2">
    <text x="32" y="96" class="mono" font-size="14">
      <tspan fill="#27c93f">your-name</tspan>
      <tspan fill="#8b89a8">@</tspan>
      <tspan fill="#38bdf8">github</tspan>
      <tspan fill="#8b89a8"> ~/portfolio </tspan>
      <tspan fill="#a78bfa">main ✦</tspan>
      <tspan fill="#8b89a8"> ❯ </tspan>
      <tspan fill="#f8fafc">whoami</tspan>
    </text>
  </g>

  <!-- Output: name big -->
  <g class="r3">
    <text x="32" y="133" class="sans" font-size="32" font-weight="700" fill="url(#acc)">Your Name</text>
  </g>

  <!-- Output: subtitle -->
  <g class="r4">
    <text x="34" y="155" class="mono" font-size="13" fill="#8b89a8">→ Mobile Dev · AI/ML · Backend · Open Source</text>
  </g>

  <!-- New prompt + cursor -->
  <g class="r4">
    <text x="32" y="182" class="mono" font-size="14">
      <tspan fill="#27c93f">your-name</tspan>
      <tspan fill="#8b89a8">@</tspan>
      <tspan fill="#38bdf8">github</tspan>
      <tspan fill="#8b89a8"> ~/portfolio </tspan>
      <tspan fill="#a78bfa">main ✦</tspan>
      <tspan fill="#8b89a8"> ❯ </tspan>
    </text>
    <rect x="210" y="169" width="9" height="16" fill="#a78bfa" class="cur"/>
  </g>
</svg>
