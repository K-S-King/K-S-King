<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- Scanline -->
  <rect width="900" height="2" fill="#a78bfa" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,222" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.12;0.12;0" keyTimes="0;0.05;0.95;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="44" x2="900" y2="44"/>
    <line x1="0" y1="88" x2="900" y2="88"/>
    <line x1="0" y1="132" x2="900" y2="132"/>
    <line x1="0" y1="176" x2="900" y2="176"/>
    <line x1="150" y1="0" x2="150" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="750" y1="0" x2="750" y2="220"/>
  </g>

  <!-- Atom -->
  <g transform="translate(810,110)">
    <circle r="8" fill="#a78bfa" opacity="0.9" filter="url(#glow)"/>
    <ellipse rx="38" ry="15" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
    <ellipse rx="52" ry="20" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3" transform="rotate(60)"/>
    <ellipse rx="66" ry="24" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.3" transform="rotate(120)"/>
    <g>
      <circle r="4" fill="#38bdf8" cx="38" cy="0"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle r="3.5" fill="#a78bfa" cx="52" cy="0"/>
      <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="6s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle r="3" fill="#818cf8" cx="66" cy="0"/>
      <animateTransform attributeName="transform" type="rotate" from="240" to="600" dur="9s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Corner — Top Left -->
  <line x1="30" y1="20" x2="30" y2="60" stroke="url(#accent)" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.1s" fill="freeze"/>
  </line>
  <line x1="30" y1="20" x2="70" y2="20" stroke="url(#accent)" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.1s" fill="freeze"/>
  </line>

  <!-- Corner — Top Right -->
  <line x1="870" y1="20" x2="870" y2="60" stroke="url(#accent)" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>
  </line>
  <line x1="870" y1="20" x2="830" y2="20" stroke="url(#accent)" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.3s" fill="freeze"/>
  </line>

  <!-- Corner — Bottom Left -->
  <line x1="30" y1="200" x2="30" y2="160" stroke="url(#accent)" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.5s" fill="freeze"/>
  </line>
  <line x1="30" y1="200" x2="70" y2="200" stroke="url(#accent)" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.5s" fill="freeze"/>
  </line>

  <!-- Corner — Bottom Right -->
  <line x1="870" y1="200" x2="870" y2="160" stroke="url(#accent)" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.7s" fill="freeze"/>
  </line>
  <line x1="870" y1="200" x2="830" y2="200" stroke="url(#accent)" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.7s" fill="freeze"/>
  </line>

  <!-- Code tags -->
  <text x="45" y="45" fill="#38bdf8" font-family="Courier New, monospace" font-size="13" opacity="0">
    &lt;dev&gt;
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.9s" fill="freeze"/>
  </text>
  <text x="45" y="192" fill="#38bdf8" font-family="Courier New, monospace" font-size="13" opacity="0">
    &lt;/dev&gt;
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.9s" fill="freeze"/>
  </text>

  <!-- Name -->
  <text x="70" y="118" fill="url(#accent)" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="44" opacity="0">
    Karan
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.4s" fill="freeze"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="340" y="88" width="3" height="38" fill="#a78bfa">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="71" y="148" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="16" letter-spacing="2" opacity="0">
    MOBILE DEV  ·  AI / ML  ·  BACKEND
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.7s" fill="freeze"/>
  </text>

  <!-- Badge: Python -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.0s" fill="freeze"/>
    <rect x="70" y="164" width="76" height="22" rx="11" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
    <text x="108" y="179" text-anchor="middle" fill="#a78bfa" font-family="Courier New, monospace" font-size="11">🐍 Python</text>
  </g>

  <!-- Badge: Flutter -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
    <rect x="155" y="164" width="82" height="22" rx="11" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
    <text x="196" y="179" text-anchor="middle" fill="#a78bfa" font-family="Courier New, monospace" font-size="11">📱 Flutter</text>
  </g>

  <!-- Badge: AI/ML -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.4s" fill="freeze"/>
    <rect x="246" y="164" width="68" height="22" rx="11" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
    <text x="280" y="179" text-anchor="middle" fill="#a78bfa" font-family="Courier New, monospace" font-size="11">🤖 AI / ML</text>
  </g>

</svg>
