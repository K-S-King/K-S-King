<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .line { stroke: url(#accent); stroke-width: 1; opacity: 0; }
      .dot  { fill: #a78bfa; opacity: 0; }
      .tag  { fill: #38bdf8; font-family: 'Courier New', monospace; font-size: 13px; opacity: 0; }
      .name { fill: url(#accent); font-family: 'Segoe UI', sans-serif; font-weight: 700; font-size: 44px; }
      .sub  { fill: #cbd5e1; font-family: 'Segoe UI', sans-serif; font-size: 16px; letter-spacing: 2px; }
      .badge-bg { rx: 12; fill: none; stroke: url(#accent); stroke-width: 1; opacity: 0.5; }
      .badge-txt { fill: #a78bfa; font-family: 'Courier New', monospace; font-size: 11px; }

      .l1 { animation: fadein 0.6s 0.1s forwards; }
      .l2 { animation: fadein 0.6s 0.3s forwards; }
      .l3 { animation: fadein 0.6s 0.5s forwards; }
      .l4 { animation: fadein 0.6s 0.7s forwards; }
      .l5 { animation: fadein 0.6s 0.9s forwards; }
      .n1 { animation: fadein 0.8s 0.4s forwards; }
      .n2 { animation: fadein 0.8s 0.7s forwards; }
      .b1 { animation: fadein 0.5s 1.0s forwards; }
      .b2 { animation: fadein 0.5s 1.2s forwards; }
      .b3 { animation: fadein 0.5s 1.4s forwards; }
      .cursor { animation: blink 1s infinite; }

      @keyframes fadein { to { opacity: 1; } }
      @keyframes blink  { 0%,100% { opacity:1; } 50% { opacity:0; } }
      @keyframes scan {
        0%   { transform: translateY(0); opacity: 0.12; }
        100% { transform: translateY(220px); opacity: 0; }
      }
      @keyframes orbit {
        from { transform: rotate(0deg) translateX(38px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(38px) rotate(-360deg); }
      }
      @keyframes orbit2 {
        from { transform: rotate(120deg) translateX(52px) rotate(-120deg); }
        to   { transform: rotate(480deg) translateX(52px) rotate(-480deg); }
      }
      @keyframes orbit3 {
        from { transform: rotate(240deg) translateX(66px) rotate(-240deg); }
        to   { transform: rotate(600deg) translateX(66px) rotate(-600deg); }
      }
      .o1 { animation: orbit  4s linear infinite; }
      .o2 { animation: orbit2 6s linear infinite; }
      .o3 { animation: orbit3 9s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- Scanline -->
  <rect width="900" height="2" fill="#a78bfa" opacity="0" style="animation: scan 4s linear infinite;">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,220" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="44" x2="900" y2="44"/>
    <line x1="0" y1="88" x2="900" y2="88"/>
    <line x1="0" y1="132" x2="900" y2="132"/>
    <line x1="0" y1="176" x2="900" y2="176"/>
    <line x1="150" y1="0" x2="150" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="750" y1="0" x2="750" y2="220"/>
  </g>

  <!-- Atom / orbit graphic -->
  <g transform="translate(810, 110)">
    <!-- nucleus -->
    <circle r="8" fill="#a78bfa" opacity="0.9" filter="url(#glow)"/>
    <!-- orbit rings -->
    <ellipse rx="38" ry="15" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
    <ellipse rx="52" ry="20" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3" transform="rotate(60)"/>
    <ellipse rx="66" ry="24" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.3" transform="rotate(120)"/>
    <!-- orbiting dots -->
    <circle r="4" fill="#38bdf8" class="o1"/>
    <circle r="3.5" fill="#a78bfa" class="o2"/>
    <circle r="3" fill="#818cf8" class="o3"/>
  </g>

  <!-- Decorative corner lines -->
  <g class="line l1">
    <line x1="30" y1="20" x2="30" y2="60" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="30" y1="20" x2="70" y2="20" stroke="url(#accent)" stroke-width="1.5"/>
  </g>
  <g class="line l2">
    <line x1="870" y1="20" x2="870" y2="60" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="870" y1="20" x2="830" y2="20" stroke="url(#accent)" stroke-width="1.5"/>
  </g>
  <g class="line l3">
    <line x1="30" y1="200" x2="30" y2="160" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="30" y1="200" x2="70" y2="200" stroke="url(#accent)" stroke-width="1.5"/>
  </g>
  <g class="line l4">
    <line x1="870" y1="200" x2="870" y2="160" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="870" y1="200" x2="830" y2="200" stroke="url(#accent)" stroke-width="1.5"/>
  </g>

  <!-- Code tag top left -->
  <text x="45" y="45" class="tag l5">&lt;dev&gt;</text>

  <!-- Name -->
  <text x="70" y="118" class="name n1">Karan</text>
  <!-- Cursor -->
  <rect x="340" y="88" width="3" height="38" fill="#a78bfa" class="cursor"/>

  <!-- Subtitle -->
  <text x="71" y="148" class="sub n2">MOBILE DEV  ·  AI / ML  ·  BACKEND</text>

  <!-- Code tag bottom left -->
  <text x="45" y="192" class="tag l5">&lt;/dev&gt;</text>

  <!-- Badges -->
  <g class="b1">
    <rect x="70" y="164" width="76" height="22" class="badge-bg"/>
    <text x="108" y="179" text-anchor="middle" class="badge-txt">🐍 Python</text>
  </g>
  <g class="b2">
    <rect x="155" y="164" width="82" height="22" class="badge-bg"/>
    <text x="196" y="179" text-anchor="middle" class="badge-txt">📱 Flutter</text>
  </g>
  <g class="b3">
    <rect x="246" y="164" width="68" height="22" class="badge-bg"/>
    <text x="280" y="179" text-anchor="middle" class="badge-txt">🤖 AI / ML</text>
  </g>
</svg>
